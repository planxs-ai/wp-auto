name: AutoBlog Publish

on:
  schedule:
    # Fork 기본 스케줄: KST 08:00, 14:00, 20:00
    - cron: '0 23 * * *'    # KST 08:00
    - cron: '0 5 * * *'     # KST 14:00
    - cron: '0 11 * * *'    # KST 20:00
    # planx-ai 추가 스케줄
    - cron: '30 23 * * *'   # KST 08:30 (bomissu)
    - cron: '30 3 * * *'    # KST 12:30 (bomissu)
    - cron: '30 10 * * *'   # KST 19:30 (bomissu)
  workflow_dispatch:
    inputs:
      count:
        description: '발행 편수'
        required: false
        default: '1'
      dry_run:
        description: '드라이런'
        type: choice
        required: false
        default: 'false'
        options:
          - 'false'
          - 'true'
      pipeline:
        description: '파이프라인'
        type: choice
        required: false
        default: 'autoblog'
        options:
          - autoblog
          - hotdeal
          - promo
      niche:
        description: '니치 필터 (빈값=전체)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # Fork 전용 — planxs-ai/wp-auto 이외의 모든 fork에서 실행
  # GitHub Secrets 3개만 설정: SUPABASE_URL, SUPABASE_KEY, SITE_ID
  # API 키는 대시보드 설정에서 입력 → Supabase에 저장됨
  # ═══════════════════════════════════════════
  fork-publish:
    if: github.repository != 'planxs-ai/wp-auto'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SITE_ID: ${{ secrets.SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish
        env:
          FORCE_RUN: 'true'
        run: |
          if [ -z "$SITE_ID" ]; then
            echo "❌ SITE_ID 시크릿이 설정되지 않았습니다."
            echo "GitHub Fork → Settings → Secrets → SITE_ID를 추가하세요."
            exit 1
          fi

          COUNT="${{ github.event.inputs.count || '1' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          PIPELINE="${{ github.event.inputs.pipeline || 'autoblog' }}"
          NICHE="${{ github.event.inputs.niche || '' }}"

          ARGS="--site-id $SITE_ID --count $COUNT --pipeline $PIPELINE --golden"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche \"$NICHE\""
          fi

          echo "▶ python scripts/main.py $ARGS"
          python scripts/main.py $ARGS

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"
          git add data/used_keywords.json || true
          git diff --staged --quiet || git commit -m "chore: update used keywords $(date +%Y-%m-%d)"
          git push || true

  # ═══ planx-ai.com (원본 전용) ═══
  planx-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.repository == 'planxs-ai/wp-auto'
      && (github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule' && (github.event.schedule == '0 23 * * *' || github.event.schedule == '0 11 * * *'))

    env:
      ALLOWED_SITE_IDS: "site-1,site-1775046458524"
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish planx-ai.com
        env:
          FORCE_RUN: 'true'
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          PIPELINE="${{ github.event.inputs.pipeline || 'autoblog' }}"
          NICHE="${{ github.event.inputs.niche || '' }}"

          ARGS="--site-id site-1 --count $COUNT --pipeline $PIPELINE --golden"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche \"$NICHE\""
          fi

          echo "▶ planx-ai.com: python scripts/main.py $ARGS"
          python scripts/main.py $ARGS

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"

          for attempt in 1 2 3; do
            git add data/used_keywords.json || true
            git stash --include-untracked || true
            git pull --rebase || true
            git stash pop || true
            git add data/used_keywords.json || true
            git diff --staged --quiet && echo "No changes to commit" && break
            git commit -m "chore: update used keywords [planx-ai] $(date +%Y-%m-%d)"
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed on attempt $attempt, retrying in 5s..."
            git pull --rebase || true
            sleep 5
          done

  # ═══ bomissu.com ═══
  bomissu:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.repository == 'planxs-ai/wp-auto'
      && (github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule' && (github.event.schedule == '30 23 * * *' || github.event.schedule == '30 3 * * *' || github.event.schedule == '30 10 * * *'))

    env:
      ALLOWED_SITE_IDS: "site-1,site-1775046458524"
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WP_URL: ${{ secrets.BOMISSU_WP_URL || secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.BOMISSU_WP_USERNAME || secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.BOMISSU_WP_APP_PASSWORD || secrets.WP_APP_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish bomissu.com
        env:
          FORCE_RUN: 'true'
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          PIPELINE="${{ github.event.inputs.pipeline || 'autoblog' }}"
          NICHE="${{ github.event.inputs.niche || '' }}"

          ARGS="--site-id site-1775046458524 --count $COUNT --pipeline $PIPELINE --golden"

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche \"$NICHE\""
          fi

          echo "▶ bomissu.com: python scripts/main.py $ARGS"
          python scripts/main.py $ARGS

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"

          for attempt in 1 2 3; do
            git add data/used_keywords.json || true
            git stash --include-untracked || true
            git pull --rebase || true
            git stash pop || true
            git add data/used_keywords.json || true
            git diff --staged --quiet && echo "No changes to commit" && break
            git commit -m "chore: update used keywords [bomissu] $(date +%Y-%m-%d)"
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push failed on attempt $attempt, retrying in 5s..."
            git pull --rebase || true
            sleep 5
          done
