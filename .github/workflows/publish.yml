name: AutoBlog Publish (Per-Site)

on:
  schedule:
    # 하루 4회 분산 발행 (KST 07:00, 12:00, 17:00, 22:00)
    - cron: '0 22 * * *'   # KST 07:00 (출근길)
    - cron: '0 3 * * *'    # KST 12:00 (점심)
    - cron: '0 8 * * *'    # KST 17:00 (퇴근길)
    - cron: '0 13 * * *'   # KST 22:00 (야간)
  workflow_dispatch:
    inputs:
      count:
        description: '발행 편수'
        required: false
        default: '3'
      dry_run:
        description: '드라이런 (true/false)'
        required: false
        default: 'false'
      pipeline:
        description: '파이프라인 (autoblog/hotdeal/promo)'
        required: false
        default: 'autoblog'
      niche:
        description: '니치/카테고리 필터 (빈값=전체)'
        required: false
        default: ''
      site_id:
        description: 'Site ID (빈값=전체 관리 사이트)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        site: ${{ inputs.site_id != '' && fromJson(format('["{0}"]', inputs.site_id)) || fromJson('["site-1","site-2","site-3"]') }}

    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      NAVER_REFRESH_TOKEN: ${{ secrets.NAVER_REFRESH_TOKEN }}
      NAVER_CAFE_CLUBID: ${{ secrets.NAVER_CAFE_CLUBID }}
      NAVER_CAFE_MENUID: ${{ secrets.NAVER_CAFE_MENUID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SITE_ID: ${{ matrix.site }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AutoBlog Engine (${{ matrix.site }})
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT="${{ github.event.inputs.count || '3' }}"
            DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
            PIPELINE="${{ github.event.inputs.pipeline || 'autoblog' }}"
            NICHE="${{ github.event.inputs.niche || '' }}"
          else
            COUNT="1"
            DRY_RUN="false"
            PIPELINE="autoblog"
            NICHE=""
          fi

          ARGS="--site-id ${{ matrix.site }} --count $COUNT --pipeline $PIPELINE --golden"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche $NICHE"
          fi

          python scripts/main.py $ARGS

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"
          git pull --rebase || true
          git add data/used_keywords.json || true
          git diff --staged --quiet || git commit -m "chore: update used keywords $(date +%Y-%m-%d) [${{ matrix.site }}]"
          git push || true
