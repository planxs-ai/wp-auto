name: AutoBlog Publish

on:
  schedule:
    # planx-ai: 08:00, 20:00 / bomissu: 08:30, 12:30, 19:30 (30분 오프셋으로 과부하 분산)
    - cron: '0 23 * * *'    # KST 08:00 (planx-ai)
    - cron: '30 23 * * *'   # KST 08:30 (bomissu)
    - cron: '30 3 * * *'    # KST 12:30 (bomissu)
    - cron: '30 10 * * *'   # KST 19:30 (bomissu)
    - cron: '0 11 * * *'    # KST 20:00 (planx-ai)
  workflow_dispatch:
    inputs:
      count:
        description: '발행 편수 (사이트별)'
        required: false
        default: '3'
      dry_run:
        description: '드라이런 (true/false)'
        type: choice
        required: false
        default: 'false'
        options:
          - 'false'
          - 'true'
      pipeline:
        description: '파이프라인'
        type: choice
        required: false
        default: 'autoblog'
        options:
          - autoblog
          - hotdeal
          - promo
      niche:
        description: '니치 (쉼표로 복수 선택, 빈값=전체랜덤) 예: 재테크 & 투자,건강 & 웰니스,교육 & 자기계발'
        required: false
        default: ''
      site_id:
        description: 'Site ID (빈값=전체 활성 사이트)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      NAVER_REFRESH_TOKEN: ${{ secrets.NAVER_REFRESH_TOKEN }}
      NAVER_CAFE_CLUBID: ${{ secrets.NAVER_CAFE_CLUBID }}
      NAVER_CAFE_MENUID: ${{ secrets.NAVER_CAFE_MENUID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      SITE_ID: ${{ secrets.SITE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AutoBlog Engine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT="${{ github.event.inputs.count || '3' }}"
            DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
            PIPELINE="${{ github.event.inputs.pipeline || 'autoblog' }}"
            NICHE="${{ github.event.inputs.niche || '' }}"
            SITE_ID="${{ github.event.inputs.site_id || '' }}"
          else
            COUNT="1"
            DRY_RUN="false"
            PIPELINE="autoblog"
            NICHE=""
            SITE_ID=""
          fi

          ARGS="--count $COUNT --pipeline $PIPELINE --golden"

          # site_id 지정 시 단일 사이트, 환경변수 SITE_ID 있으면 그것 사용, 둘 다 없으면 scheduled
          if [ -n "$SITE_ID" ]; then
            ARGS="$ARGS --site-id $SITE_ID"
          elif [ -n "${{ secrets.SITE_ID }}" ]; then
            ARGS="$ARGS --site-id ${{ secrets.SITE_ID }}"
          elif [ -n "${{ secrets.WP_URL }}" ]; then
            echo "WP_URL 환경변수 기반 단일 사이트 모드"
          else
            ARGS="$ARGS --mode scheduled"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche \"$NICHE\""
          fi

          python scripts/main.py $ARGS

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"
          git pull --rebase || true
          git add data/used_keywords.json || true
          git diff --staged --quiet || git commit -m "chore: update used keywords $(date +%Y-%m-%d)"
          git push || true
